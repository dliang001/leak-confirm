<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="漏点确认">
<title>漏点确认记录工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0c0e14;--card:#161924;--bdr:#262b3d;--pri:#3b82f6;--priDk:#1d4ed8;--grn:#22c55e;--grnBg:#052e16;--org:#f59e0b;--orgBg:#422006;--red:#ef4444;--redBg:#450a0a;--pur:#a855f7;--purBg:#1a0533;--cyn:#06b6d4;--txt:#e2e8f0;--mut:#94a3b8;--dim:#64748b;--inp:#0f1219}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:74px;font-size:14px}
input,textarea,select{font-family:inherit;font-size:15px}
.hd{background:var(--card);border-bottom:1px solid var(--bdr);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hd h1{font-size:16px;font-weight:700}.hd .sub{font-size:11px;color:var(--dim)}
.nv{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--bdr);display:flex;z-index:100}
.nv button{flex:1;padding:8px 0;text-align:center;font-size:10px;background:none;border:none;cursor:pointer;color:var(--dim);font-weight:400}
.nv button.a{color:var(--pri);font-weight:700}.nv .ic{font-size:18px;display:block;margin-bottom:1px}.nv .ic.b{font-size:26px;line-height:22px}
.vw{padding:12px 16px 24px;display:none}.vw.a{display:block}
.tst{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--grn);color:#fff;padding:8px 22px;border-radius:20px;font-size:13px;font-weight:600;z-index:400;opacity:0;transition:opacity .2s;pointer-events:none}.tst.s{opacity:1}
.fg{margin-bottom:14px}.lb{font-size:12px;font-weight:600;color:var(--mut);margin-bottom:5px;display:block}
.ip{width:100%;background:var(--inp);border:1px solid var(--bdr);border-radius:8px;padding:11px 12px;color:var(--txt);font-size:15px;outline:none}
textarea.ip{min-height:60px;resize:vertical}
.cg{display:flex;flex-wrap:wrap;gap:7px}
.ch{padding:9px 13px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--inp);color:var(--dim);border:1.5px solid var(--bdr);user-select:none}
.ch.s{background:var(--priDk);color:#fff;border-color:var(--pri)}.ch.sm{padding:8px 10px;font-size:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.fx{display:flex;gap:8px}.f1{flex:1}
.bt{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;color:#fff;margin-top:6px}
.bt-p{background:var(--pri)}.bt-g{background:var(--grn)}.bt-r{background:var(--red)}.bt-c{background:var(--cyn)}.bt-gh{background:var(--card);color:var(--mut)}
.bt-s{width:auto;padding:9px 16px;margin-top:0;font-size:13px}
.cd{background:var(--card);border-radius:10px;border:1px solid var(--bdr);padding:11px 14px;margin-bottom:7px;cursor:pointer}
.tg{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600}
.tb{border-radius:12px;padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.tb.i{background:var(--card);border:1px solid var(--bdr)}.tb.r{background:var(--priDk);border:1px solid var(--pri)}
.td{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}
.sr{display:flex;gap:5px;margin-bottom:10px}.sc{flex:1;background:var(--card);border-radius:10px;padding:7px 4px;text-align:center;border:1px solid var(--bdr)}
.sc .n{font-size:19px;font-weight:800}.sc .l{font-size:10px;color:var(--dim)}
.fb{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto}.fc{padding:5px 10px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid var(--bdr);background:transparent;color:var(--dim)}.fc.a{border-color:var(--pri);background:var(--priDk);color:#fff}
.md{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.mb{background:var(--card);border-radius:16px 16px 0 0;max-width:480px;width:100%;max-height:85vh;overflow:auto;padding:20px 18px 30px}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.mh h3{font-size:16px}.mc{background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer}
.dr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bdr)}.dr .dl{color:var(--dim);font-size:13px}.dr .dv{color:var(--txt);font-size:13px;font-weight:600;text-align:right;max-width:60%}
.br{margin-bottom:7px}.bl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px}.bk{height:5px;background:var(--inp);border-radius:3px}.bf{height:5px;border-radius:3px}
.di{padding:10px 12px;border-radius:8px;margin-bottom:4px;cursor:pointer;border:1px solid var(--bdr)}.di.u{opacity:.4;cursor:default;background:var(--inp)}
.sd{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}.sd-ok{background:var(--grn)}.sd-off{background:var(--dim)}.sd-err{background:var(--red)}.sd-ing{background:var(--org);animation:pu 1s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
canvas{display:none}
</style>
</head>
<body>
<div class="hd"><div><h1>漏点确认记录</h1><div class="sub"><span id="sB"></span><span id="dC"></span></div></div><div style="text-align:right"><div style="font-size:19px;font-weight:800;color:var(--grn)"><span id="hC">0</span><span style="font-size:11px;font-weight:400;color:var(--dim)">/<span id="hT">0</span></span></div><div style="font-size:10px;color:var(--dim)">确认/总数</div></div></div>
<div class="tst" id="toast"></div>
<div class="vw a" id="vL"></div><div class="vw" id="vA"></div><div class="vw" id="vS"></div><div class="vw" id="vD"></div><div class="vw" id="vC"></div>
<input type="file" id="camIn" accept="image/*" capture="environment" style="display:none">
<input type="file" id="xlIn" accept=".xlsx,.xls,.csv,.tsv" style="display:none">
<input type="file" id="jsIn" accept=".json" style="display:none">
<canvas id="wm"></canvas>
<div class="nv">
<button class="a" onclick="go('L')" id="nL"><span class="ic">📋</span>记录</button>
<button onclick="go('A')" id="nA"><span class="ic b">⊕</span>新增</button>
<button onclick="go('S')" id="nS"><span class="ic">📊</span>统计</button>
<button onclick="go('C')" id="nC"><span class="ic">⚙️</span>设置</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const RS=[{v:"confirmed",l:"✅ 确认漏点",c:"var(--grn)",bg:"var(--grnBg)"},{v:"suspected",l:"🔶 疑似漏点",c:"var(--org)",bg:"var(--orgBg)"},{v:"not_found",l:"❌ 未发现",c:"var(--red)",bg:"var(--redBg)"},{v:"unable",l:"⚠️ 无法检测",c:"var(--pur)",bg:"var(--purBg)"}];
const LT=["管体裂缝","接口渗漏","阀门漏损","消防栓","用户侧","其他"],MT=["铸铁","PVC","PE","钢管","水泥管","不明"];
const DN2=["DN50","DN75","DN100","DN150","DN200","DN250","DN300","DN400","DN500","DN600+"];
const DP2=["<0.5m","0.5-1m","1-1.5m","1.5-2m",">2m","不明"],SFc=["柏油路","水泥路","泥土","绿化带","砖石路","其他"];
const VL=[{v:"large",l:"大 >5t/日"},{v:"medium",l:"中 1-5t/日"},{v:"small",l:"小 <1t/日"}];
const DFc=[{v:"easy",l:"简单"},{v:"medium",l:"中等"},{v:"hard",l:"困难"}];
const FMp=[{f:"alertId",l:"告警编号",k:["编号","id","告警","alert","设备","sensor","编码","序号","点位"]},{f:"lat",l:"纬度",k:["纬度","lat","latitude","y"]},{f:"lng",l:"经度",k:["经度","lng","lon","longitude","x"]},{f:"material",l:"管材",k:["管材","材质","material"]},{f:"diameter",l:"管径",k:["管径","口径","diameter","dn"]},{f:"depth",l:"埋深",k:["埋深","depth","burial"]},{f:"location",l:"位置",k:["位置","地址","address","location","地点"]},{f:"notes",l:"备注",k:["备注","说明","remark","note"]}];
let recs=JSON.parse(localStorage.getItem("lk-r")||"[]"),team=JSON.parse(localStorage.getItem("lk-t")||"[]"),devs=JSON.parse(localStorage.getItem("lk-d")||"[]");
let ghT=localStorage.getItem("lk-ght")||"",ghR=localStorage.getItem("lk-ghr")||"dliang001/leak-confirm",ghSha=localStorage.getItem("lk-sha")||"",lsync=localStorage.getItem("lk-ls")||"",sst="off";
let eId=null,tiv=null,elp=0,tng=false,cv="L",flt="all",pCnt=0;
let F={alertId:"",result:"",leakType:"",material:"",diameter:"",depth:"",surface:"",volume:"",difficulty:"",location:"",notes:"",person:"",lat:"",lng:"",duration:0};
const sv=()=>localStorage.setItem("lk-r",JSON.stringify(recs)),svT=()=>localStorage.setItem("lk-t",JSON.stringify(team)),svD=()=>localStorage.setItem("lk-d",JSON.stringify(devs));
const svG=()=>{localStorage.setItem("lk-ght",ghT);localStorage.setItem("lk-ghr",ghR);localStorage.setItem("lk-sha",ghSha);localStorage.setItem("lk-ls",lsync)};
function toast(m){const t=Q("toast");t.textContent=m;t.classList.add("s");setTimeout(()=>t.classList.remove("s"),2200)}
const Q=id=>document.getElementById(id);
const fT=ts=>{const d=new Date(ts);return(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,'0')+":"+String(d.getMinutes()).padStart(2,'0')};
const fF=ts=>{const d=new Date(ts);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0')+" "+String(d.getHours()).padStart(2,'0')+":"+String(d.getMinutes()).padStart(2,'0')};
const fD=s=>{if(!s)return"-";const m=Math.floor(s/60),ss=s%60;return m>0?m+"分"+(ss>0?ss+"秒":""):ss+"秒"};
const rl=v=>RS.find(r=>r.v===v);
function gs(){const s={total:recs.length,confirmed:recs.filter(r=>r.result==="confirmed").length,suspected:recs.filter(r=>r.result==="suspected").length,not_found:recs.filter(r=>r.result==="not_found").length,unable:recs.filter(r=>r.result==="unable").length};s.rate=s.total?((s.confirmed/s.total)*100).toFixed(1):"0";return s}
function uh(){const s=gs();Q("hC").textContent=s.confirmed;Q("hT").textContent=s.total;Q("dC").textContent=devs.length?devs.length+"设备":"现场工具";uSB()}
function uSB(){const b=Q("sB");if(!ghT){b.innerHTML="";return}b.innerHTML='<span class="sd sd-'+sst+'"></span>'+(sst==="ok"?"已同步 · ":sst==="ing"?"同步中 · ":sst==="err"?"同步失败 · ":"");}

// ===== GITHUB SYNC =====
async function ghGet(p){if(!ghT||!ghR)return null;try{const r=await fetch("https://api.github.com/repos/"+ghR+"/contents/"+p,{headers:{Authorization:"token "+ghT,Accept:"application/vnd.github.v3+json"}});if(r.status===404)return{exists:false};if(!r.ok)throw r.status;const d=await r.json();return{exists:true,sha:d.sha,content:JSON.parse(atob(d.content))}}catch(e){return null}}
async function ghPut(p,c,sha){if(!ghT||!ghR)return false;try{const b={message:"sync "+new Date().toISOString().slice(0,16),content:btoa(unescape(encodeURIComponent(JSON.stringify(c,null,2))))};if(sha)b.sha=sha;const r=await fetch("https://api.github.com/repos/"+ghR+"/contents/"+p,{method:"PUT",headers:{Authorization:"token "+ghT,Accept:"application/vnd.github.v3+json","Content-Type":"application/json"},body:JSON.stringify(b)});if(!r.ok)throw r.status;const d=await r.json();ghSha=d.content.sha;svG();return true}catch(e){return false}}
async function sPush(){if(!ghT)return;sst="ing";uSB();const ok=await ghPut("data/records.json",{records:recs,team,devices:devs,lastUpdate:Date.now()},ghSha);if(ok){sst="ok";lsync=fF(Date.now());svG();toast("☁️ 已同步")}else{sst="err";toast("同步失败")}uSB();if(cv==="C")rC()}
async function sPull(){if(!ghT)return;sst="ing";uSB();const r=await ghGet("data/records.json");if(!r){sst="err";uSB();toast("拉取失败");return}if(!r.exists){sst="ok";uSB();toast("云端暂无数据");return}ghSha=r.sha;const rm2=r.content;if(rm2.records){const lm=new Map(recs.map(r2=>[r2.id,r2]));rm2.records.forEach(rr=>{const lo=lm.get(rr.id);if(!lo)recs.push(rr);else if(rr.updatedAt>lo.updatedAt)lm.set(rr.id,rr)});recs=[...lm.values()].sort((a,b)=>b.timestamp-a.timestamp);sv()}if(rm2.team){team=[...new Set([...team,...rm2.team])];svT()}if(rm2.devices&&rm2.devices.length>devs.length){devs=rm2.devices;svD()}sst="ok";lsync=fF(Date.now());svG();uh();toast("☁️ 云端已同步");if(cv==="L")rL();if(cv==="C")rC()}
async function sTst(){if(!ghT){toast("请先输入Token");return}sst="ing";uSB();try{const r=await fetch("https://api.github.com/repos/"+ghR,{headers:{Authorization:"token "+ghT}});if(r.ok){sst="ok";uSB();toast("✅ 连接成功");const g=await ghGet("data/records.json");if(g&&g.exists)ghSha=g.sha;svG()}else{sst="err";uSB();toast("失败：检查Token和仓库名")}}catch(e){sst="err";uSB();toast("网络错误")}if(cv==="C")rC()}
async function aSync(){if(ghT){await sPush();const mb=await chkSize();if(mb>=SWARN)setTimeout(()=>toast(mb>=SCRIT?"⚠️ 云端空间紧张("+mb.toFixed(0)+"MB)！请清理":"💡 云端已用"+mb.toFixed(0)+"MB，注意清理"),1500)}}

// ===== NAV =====
function go(v,nr){cv=v;document.querySelectorAll(".vw").forEach(e=>e.classList.remove("a"));document.querySelectorAll(".nv button").forEach(b=>b.classList.remove("a"));Q("v"+v)?.classList.add("a");Q("n"+v)?.classList.add("a");if(v==="L")rL();else if(v==="A"&&!nr){rFm();rA()}else if(v==="A")rA();else if(v==="S")rS();else if(v==="C")rC()}
function rFm(){const kp=F.person;F={alertId:"",result:"",leakType:"",material:"",diameter:"",depth:"",surface:"",volume:"",difficulty:"",location:"",notes:"",person:kp,lat:"",lng:"",duration:0};eId=null;elp=0;tng=false;pCnt=0;pendingPhotos=[];clearInterval(tiv)}
function sf(k,v){F[k]=F[k]===v?"":v;rA()}
function mc2(items,field,cls){return items.map(i=>{const v=typeof i==="object"?i.v:i,l=typeof i==="object"?i.l:i;return'<div class="ch'+(cls?' '+cls:'')+(F[field]===v?' s':'')+'" onclick="sf(\''+field+"','"+v+"')\">"+l+"</div>"}).join("")}

function tiS(){tng=true;elp=0;tiv=setInterval(()=>{elp++;const e=Q("tD");if(e)e.textContent=String(Math.floor(elp/60)).padStart(2,'0')+":"+String(elp%60).padStart(2,'0')},1000);rA()}
function tiE(){clearInterval(tiv);F.duration=elp;tng=false;rA()}
function gps(){if(!navigator.geolocation){toast("请在手机浏览器中打开");return}toast("定位中...");navigator.geolocation.getCurrentPosition(p=>{F.lat=p.coords.latitude.toFixed(6);F.lng=p.coords.longitude.toFixed(6);toast("📍 定位成功");rA()},er=>{toast(er.code===1?"请允许位置权限":er.code===2?"GPS信号不可用":"定位超时")},{enableHighAccuracy:true,timeout:10000})}

// ===== WATERMARK =====
let pendingPhotos=[];
Q("camIn").addEventListener("change",function(e){
  const file=e.target.files?.[0];if(!file)return;const img=new Image();
  img.onload=function(){const c=Q("wm"),W=img.width,H=img.height;c.width=W;c.height=H;const x=c.getContext("2d");x.drawImage(img,0,0);
    const bH=Math.max(110,H*0.09);x.fillStyle="rgba(0,0,0,0.75)";x.fillRect(0,H-bH,W,bH);
    const f1=Math.max(26,Math.min(W*0.04,40)),f2=Math.max(16,Math.min(W*0.025,24)),pd=16;
    const rm={confirmed:"确认漏点",suspected:"疑似漏点",not_found:"未发现",unable:"无法检测"};
    const rc={confirmed:"#22c55e",suspected:"#f59e0b",not_found:"#ef4444",unable:"#a855f7"};
    const y1=H-bH+f1+8;x.fillStyle="#22c55e";x.font="bold "+f1+"px -apple-system,sans-serif";x.fillText("#"+(F.alertId||"--"),pd,y1);
    const rt=rm[F.result]||"";x.fillStyle=rc[F.result]||"#f59e0b";x.font="bold "+f2+"px -apple-system,sans-serif";x.fillText(rt,W-x.measureText(rt).width-pd,y1);
    x.fillStyle="#e2e8f0";x.font=f2+"px -apple-system,sans-serif";x.fillText(fF(Date.now())+(F.person?" | "+F.person:"")+(F.lat?" | "+F.lat+","+F.lng:""),pd,y1+f2+10);
    const l3=[F.material,F.diameter,F.depth,F.leakType].filter(Boolean).join(" | ");
    if(l3){x.fillStyle="#94a3b8";x.fillText(l3,pd,y1+f2*2+18)}
    c.toBlob(bl=>{const a=document.createElement("a");a.href=URL.createObjectURL(bl);a.download="漏点_"+(F.alertId||"p")+"_"+Date.now()+".jpg";a.click();
      // Generate medium thumbnail (800px, ~40-50KB) for GitHub storage
      const tc=document.createElement("canvas");const mx=800;let tw=W,th=H;
      if(tw>th){if(tw>mx){th=th*mx/tw;tw=mx}}else{if(th>mx){tw=tw*mx/th;th=mx}}
      tc.width=tw;tc.height=th;tc.getContext("2d").drawImage(img,0,0,tw,th);
      const thumb=tc.toDataURL("image/jpeg",0.55);
      pendingPhotos.push({data:thumb,time:Date.now()});
      pCnt++;toast("📷 已保存 ("+pCnt+") 含云端缩略图");rA();
    },"image/jpeg",0.85)};
  img.src=URL.createObjectURL(file);e.target.value=""});
function takePhoto(){Q("camIn").click()}

// ===== SUBMIT =====
async function submit(){if(!F.alertId||!F.result){toast("请填写编号和确认结果");return}if(tng){clearInterval(tiv);F.duration=elp;tng=false}
  const id=eId||"R"+Date.now(),rec=Object.assign({},F,{id,photoCount:pCnt,timestamp:eId?(recs.find(r=>r.id===eId)?.timestamp||Date.now()):Date.now(),updatedAt:Date.now()});
  if(eId){const i=recs.findIndex(r=>r.id===eId);if(i>=0)recs[i]=rec}else recs.unshift(rec);sv();
  if(F.person&&!team.includes(F.person)){team.push(F.person);svT()}toast(eId?"已更新":"#"+F.alertId+" ✓");
  // Upload photos to GitHub if available
  const recId=id;const phToUpload=[...pendingPhotos];
  rFm();uh();go("L");
  if(ghT&&phToUpload.length>0){uploadPhotos(recId,phToUpload)}else{aSync()}}
function del2(id){if(!confirm("确认删除？"))return;recs=recs.filter(r=>r.id!==id);sv();uh();go("L");aSync()}
async function ed(id){const r=recs.find(x=>x.id===id);if(!r)return;F=Object.assign({},r);eId=r.id;elp=r.duration||0;tng=false;pCnt=r.photoCount||0;pendingPhotos=await loadRecPhotos(id);go("A",true);rA()}

// ===== LIST =====
function rL(){const s=gs(),fl=flt==="all"?recs:recs.filter(r=>r.result===flt);let h="";
  if(!recs.length){h='<div style="text-align:center;padding:40px 20px"><div style="font-size:44px;margin-bottom:10px">📋</div><p style="color:var(--dim);margin-bottom:16px">暂无记录</p>';
    if(!devs.length)h+='<button class="bt bt-c bt-s" onclick="Q(\'xlIn\').click()">📊 导入设备数据</button>';
    if(ghT)h+='<button class="bt bt-p bt-s" style="margin-left:8px" onclick="sPull()">☁️ 云端拉取</button>';h+="</div>"}
  else{h+='<div class="sr">'+[{n:s.total,l:"总计",c:"var(--pri)"},{n:s.confirmed,l:"确认",c:"var(--grn)"},{n:s.suspected,l:"疑似",c:"var(--org)"},{n:s.not_found+s.unable,l:"未发现",c:"var(--red)"}].map(x=>'<div class="sc" style="border-top:2px solid '+x.c+'"><div class="n" style="color:'+x.c+'">'+x.n+'</div><div class="l">'+x.l+"</div></div>").join("")+"</div>";

function showImp(hs,rs,fn){impSt={h:hs,r:rs,m:autoMap2(hs)};let h='<div class="md" id="impMd"><div class="mb"><div class="mh"><h3>📊 列映射</h3><button class="mc" onclick="Q(\'impMd\').remove()">×</button></div><p style="font-size:12px;color:var(--dim);margin-bottom:4px">'+fn+" · "+rs.length+"条</p><p style=\"font-size:12px;color:var(--cyn);margin-bottom:16px\">已自动识别：</p>";
  FMp.forEach(fm=>{h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:12px;color:var(--mut);width:66px;flex-shrink:0;text-align:right">'+fm.l+'</span><span style="color:var(--dim);font-size:12px">←</span><select style="flex:1;background:var(--inp);border:1px solid var(--bdr);border-radius:6px;padding:8px 10px;color:'+(impSt.m[fm.f]!==undefined?"var(--grn)":"var(--dim)")+';font-size:13px;outline:none" onchange="impSt.m[\''+fm.f+"']=this.value==='-1'?undefined:parseInt(this.value)\"><option value=\"-1\">— 不映射 —</option>";
    hs.forEach((col,i)=>{const pv=rs[0]?.[i]?" ("+String(rs[0][i]).slice(0,12)+")":"";h+='<option value="'+i+'"'+(impSt.m[fm.f]===i?" selected":"")+">"+col+pv+"</option>"});h+="</select></div>"});
  h+='<button class="bt bt-c" style="margin-top:12px" onclick="confImp()">确认导入 '+rs.length+" 条</button></div></div>";document.body.insertAdjacentHTML("beforeend",h)}
function confImp(){if(impSt.m.alertId===undefined){toast("请映射告警编号");return}devs=impSt.r.map(row=>{const d={};Object.entries(impSt.m).forEach(([f,ci])=>{if(ci!==undefined&&row[ci]!==undefined)d[f]=(row[ci]||"").toString().trim()});return d}).filter(d=>d.alertId);svD();Q("impMd")?.remove();toast("已导入 "+devs.length+" 条");uh();if(cv==="S")rS();aSync()}

// ===== PHOTO CLOUD STORAGE =====
async function uploadPhotos(recId,photos){
  if(!ghT||!photos.length)return aSync();
  sst="ing";uSB();
  const path="data/photos_"+recId+".json";
  // Check if exists
  const existing=await ghGet(path);
  const sha2=existing&&existing.exists?existing.sha:"";
  const ok=await ghPut(path,{recordId:recId,photos:photos,updatedAt:Date.now()},sha2);
  if(ok){toast("📷 "+photos.length+"张照片已同步云端")}
  await aSync();
}
async function loadRecPhotos(recId){
  if(!ghT)return[];
  try{
    const r=await ghGet("data/photos_"+recId+".json");
    if(r&&r.exists&&r.content.photos)return r.content.photos;
  }catch(e){}
  return[];
}

// ===== STORAGE MONITOR =====
const SLIM=100,SWARN=50,SCRIT=80;let cloudMB=0;
function estSize(){const rs=JSON.stringify(recs).length;const tp=recs.reduce((a,r)=>a+(r.photoCount||0),0);return(rs+tp*50*1024)/(1024*1024)}
async function chkSize(){if(!ghT||!ghR)return estSize();try{const r=await fetch("https://api.github.com/repos/"+ghR,{headers:{Authorization:"token "+ghT}});if(r.ok){const d=await r.json();cloudMB=(d.size||0)/1024;return cloudMB}}catch(e){}return estSize()}
function sBar(mb){const p=Math.min(mb/SLIM*100,100),c=mb>=SCRIT?"var(--red)":mb>=SWARN?"var(--org)":"var(--grn)";return'<div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>云端存储</span><span style="color:'+c+';font-weight:700">'+mb.toFixed(1)+"MB / "+SLIM+'MB</span></div><div style="height:8px;background:var(--inp);border-radius:4px"><div style="height:8px;border-radius:4px;background:'+c+";width:"+p+'%"></div></div></div>'}
function sWarn(mb){if(mb>=SCRIT)return'<div style="background:var(--redBg);border:1px solid var(--red);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px"><b style="color:var(--red)">⚠️ 存储严重不足！</b>请立即导出并清理云端。</div>';if(mb>=SWARN)return'<div style="background:var(--orgBg);border:1px solid var(--org);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px"><b style="color:var(--org)">⚠️ 存储已过半</b> 建议导出归档后清理。</div>';return''}
